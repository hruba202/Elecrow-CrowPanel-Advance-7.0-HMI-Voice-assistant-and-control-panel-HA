# Backlight configuration pro v1.2
output:
  - platform: template
    id: backlight_output
    type: float
    write_action:
      - lambda: |-
          uint8_t brightness = 0x05 + (uint8_t)(state * (0x10 - 0x05));
          id(bus_a).write(0x30, &brightness, 1, true);

light:
  - platform: monochromatic
    name: "Backlight"
    output: backlight_output
    id: backlight
    restore_mode: ALWAYS_ON

display:
  - platform: rpi_dpi_rgb
    id: main_display
    color_order: RGB
    invert_colors: true
    update_interval: never
    auto_clear_enabled: false
    dimensions:
      width: 800
      height: 480
    de_pin: 42
    hsync_pin: 40
    vsync_pin: 41
    pclk_pin: 39
    pclk_frequency: 20MHz
    hsync_pulse_width: 4
    hsync_front_porch: 8
    hsync_back_porch: 8
    vsync_pulse_width: 4
    vsync_front_porch: 8
    vsync_back_porch: 8
    data_pins:
      red:
        - 7
        - 17
        - 18
        - 3
        - 46
      green:
        - 9
        - 10
        - 11
        - 12
        - 13
        - 14
      blue:
        - 21
        - 47
        - 48
        - 45
        - 38