time:  

  - platform: pcf8563    # BM8563 je kompatibilní s PCF8563 driverem
    id: rtc_time
    address: 0x51
    i2c_id: bus_a
    
    on_time_sync:
     - logger.log: "RTC čas synchronizován s HA"
    # -sync_interval: "1 minute"  # Example configuration for syncing every minute
    # - sync_time: "18:00:21"
    # -logger.log: "RTC čas synchronizován s HA"
     - script.execute: time_update
  - platform: homeassistant
    id: time_comp
    on_time_sync:
      - script.execute: time_update

interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: clock_label
          text: !lambda |-
            auto time = id(rtc_time).now();
            return str_sprintf("%02d:%02d:%02d", time.hour, time.minute, time.second );
      - script.execute: time_update

output:
  - platform: template
    id: stc8h_backlight_output
    type: float
    write_action:
      - lambda: |-
          uint8_t command;
          if (state <= 0.0f) {
            command = 245;
          } else {
            command = (uint8_t) roundf((1.0f - state) * 244.0f);
          }
          uint8_t cmd[1] = { command };
          id(bus_a).write(0x30, cmd, 1);
          ESP_LOGD("backlight", "State: %.2f | Brightness command: %d", state, command);

  - platform: template
    id: backlight_output
    type: binary
    write_action:
      - lambda: |-
          uint8_t config_reg = 0x03;
          uint8_t config_data = 0xFD;
          id(pca9557).write_byte(config_reg, config_data);
          delay(10);
          uint8_t output_reg = 0x01;
          uint8_t output_data = state ? 0x02 : 0x00;
          id(pca9557).write_byte(output_reg, output_data);

binary_sensor:
  - platform: homeassistant
    id: lock
    entity_id: lock.zamek_vrata
    publish_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: lock_label
          state:
            checked: !lambda return x;
  - platform: homeassistant
    name: "Backlight Control Boolean"
    entity_id: input_boolean.panelr2_bcklight
    internal: true
    on_state:
      then:
        - logger.log:
            format: "HA Backlight Boolean received state: %s"
            args:
              - 'x ? "ON" : "OFF"'
        - if:
            condition:
              lambda: 'return x;'
            then:
              - light.turn_on:
                  id: backlight
            else:
              - light.turn_off:
                  id: backlight



 
 
