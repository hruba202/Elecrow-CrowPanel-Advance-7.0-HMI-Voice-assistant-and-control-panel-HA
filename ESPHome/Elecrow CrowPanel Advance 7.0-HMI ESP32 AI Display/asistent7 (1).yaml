esphome:
  name: asistent7
  friendly_name: "asistent 7"
  min_version: 2025.5.0
  name_add_mac_suffix: true
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
  on_boot:
    priority: 600
    then:
    # Podsvícení
      - lambda: |-
          uint8_t cmd_bl[1] = { 0x00 };
          id(bus_a).write(0x30, cmd_bl, 1);
    #  - delay: 200ms
    # Zapni zesilovač (unmute NS4168)
     # - lambda: |-
      #    uint8_t cmd_spk[1] = { 248 };
       #   id(bus_a).write(0x30, cmd_spk, 1);
      - delay: 200ms
      - lambda: |-   
          uint8_t cmd_audio[] = { 0xf8 }; 
          id(bus_a).write(0x30, cmd_audio, 1);
      - delay: 200ms
      
      
      - script.execute: draw_display

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
   
    advanced:
      enable_idf_experimental_features: true
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 120MHz
  ignore_not_found: false
api:
  encryption:
    key: !secret esp_encryption_key
  on_client_connected:
    - script.execute: draw_display
  on_client_disconnected:
    - script.execute: draw_display

ota:
  - platform: esphome

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
  manual_ip:
    static_ip: 192.168.0.87
    gateway: 192.168.0.2
    subnet: 255.255.255.0
  on_connect:
    - script.execute: draw_display
  on_disconnect:
    - script.execute: draw_display

captive_portal:


button:
  - platform: factory_reset
    id: factory_reset_btn
    internal: true


sensor:
  - platform: homeassistant
    id: ha_temperature_sensor
    entity_id: sensor.th_prujezd_temperature
    internal: true
    unit_of_measurement: °C
    on_value:
      - lvgl.indicator.update:
          id: val_needle
          value: !lambda return x;
      - lvgl.label.update:
          id: label_temp
          text:
            format: "%.1f°C"
            args:
              - x




number:
  - platform: homeassistant
    name: "Backlight Slider Source"
    entity_id: input_number.panelr2_bcklight
    internal: true
    on_value:
      then:
        - logger.log:
            format: "HA Slider received value: %.2f"
            args:
              - x
        - light.turn_on:
            id: backlight
            brightness: !lambda 'return x / 5.0;'
  - platform: template
    name: LVGL Screen timeout
    id: display_timeout
    optimistic: true
    unit_of_measurement: "s"
    initial_value: 45
    restore_value: true
    min_value: 10
    max_value: 600
    step: 10
    mode: box
  
touchscreen:
  platform: gt911
  id: touch
  address: 0x5D
  i2c_id: bus_a
  on_touch:
    then:
      - light.turn_on: backlight

  on_release:
    - if:
        condition: lvgl.is_paused
        then:
          - lvgl.resume
          - light.turn_on: backlight
i2c_device:
  id: pca9557
  address: 0x51
  i2c_id: bus_a

i2c:
  sda: 15
  scl: 16
  scan: true
  id: bus_a

i2s_audio:
  - id: i2s_mic
    i2s_lrclk_pin: GPIO19      # MIC_WS
    i2s_bclk_pin: GPIO2      # MIC_CLK
  

  - id: i2s_spk
    i2s_lrclk_pin: GPIO6      # SPK I2S_LRCLK
    i2s_bclk_pin: GPIO5       # SPK I2S_BCLK


microphone:
  - platform: i2s_audio
    id: pdm_microphone
    i2s_audio_id: i2s_mic     # ← MIKROFON BUS
    i2s_din_pin: GPIO20       # MIC_SD
    adc_type: external
    pdm: True
    
    bits_per_sample: 16bit
    channel: left

speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_audio_id: i2s_spk     # ← REPRODUKTOR BUS
    i2s_dout_pin: GPIO4       # SPK I2S_SDIN
    dac_type: external
  
    sample_rate: 48000
    bits_per_sample: 16bit
    channel: mono
    buffer_duration: 100ms
    timeout: 500ms
media_player:
  - platform: speaker
    name: "aipanel přehrávač"
    id: speaker_media_player
    volume_min: 0.3
    volume_max: 0.8
    announcement_pipeline:
      speaker: box_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1
    files:
      - id: timer_finished_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
    on_announcement:
      # Zapni zesilovač PŘED přehráváním
      - lambda: |-
          uint8_t cmd[1] = { 0xF8 };
          id(bus_a).write(0x30, cmd, 1);
      - delay: 400ms
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - script.execute: stop_wake_word
            - if:
                condition:
                  - lambda: return id(wake_word_engine_location).state == "In Home Assistant";
                then:
                  - wait_until:
                      - not:
                          voice_assistant.is_running:
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
            - delay: 200ms
            - script.execute: draw_display
    on_idle:
      - delay: 600ms
      # Vypni zesilovač PO přehrávání
      - lambda: |-
          uint8_t cmd[1] = { 249 };
          id(bus_a).write(0x30, cmd, 1);
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - script.execute: start_wake_word
            - script.execute: set_idle_or_mute_phase
            - delay: 200ms
            - script.execute: draw_display

micro_wake_word:
  id: mww
  microphone:
    microphone: pdm_microphone
    gain_factor: 4
  stop_after_detection: false
  models:
    model: github://esphome/micro-wake-word-models/models/okay_nabu.json@main
    id: okay_nabu
  on_wake_word_detected:
    - lambda: ESP_LOGI("MWW", "WAKE WORD DETECTED!");
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone: pdm_microphone
  media_player: speaker_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2
  on_listening:
    - if:
        condition:
          - lvgl.is_paused
          - light.is_off: backlight
        then:
          - lvgl.resume
          - light.turn_on: backlight
    
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
    - text_sensor.template.publish:
        id: text_request
        state: "..."
    - text_sensor.template.publish:
        id: text_response
        state: "..."
    - lvgl.label.update:
        id: req_label
        text: "..."
    - lvgl.label.update:
        id: reply_label
        text: "..."
    - delay: 50ms
    - script.execute: draw_display
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: draw_display
  on_stt_end:
    - script.execute: draw_display
    - text_sensor.template.publish:
        id: text_request
        state: !lambda return x;
    - lvgl.label.update:
        id: req_label
        text: !lambda return x;
    - script.execute:
        id: send_stt_text_event
        stt_text: !lambda return x;
    
  on_tts_start:
   
    - delay: 50ms
    - text_sensor.template.publish:
        id: text_response
        state: !lambda return x;
    - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
    - lvgl.label.update:
        id: reply_label
        text: !lambda 'return x;'
    - delay: 100ms
    - script.execute: draw_display
  
  
  on_end:
    - wait_until:
        condition:
          - media_player.is_announcing: null
        timeout: 0.5s
    - wait_until:
        - and:
            - not:
                media_player.is_announcing: null
            - not:
                speaker.is_playing: null
    - if:
        condition:
          - lambda: return id(wake_word_engine_location).state == "On device";
        then:
          - lambda: id(va).set_use_wake_word(false);
          - micro_wake_word.start: null
    - delay: 100ms
    - script.execute: set_idle_or_mute_phase
    - delay: 300ms
    - script.execute: draw_display
  on_error:
    - if:
        condition:
          lambda: return !id(init_in_progress);
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: draw_display
          - delay: 1s
          - if:
              condition:
                switch.is_off: mute
              then:
                - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
              else:
                - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
          - script.execute: draw_display
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - script.execute: start_wake_word
    - script.execute: set_idle_or_mute_phase
    - delay: 200ms
    - script.execute: draw_display
  on_client_disconnected:
    - script.execute: stop_wake_word
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: draw_display
  on_tts_end:
    - delay: 400ms
    - script.execute:
        id: send_tts_uri_event
        tts_uri: return x;

script:
  - id: time_update
    then:
      - lvgl.label.update:
          id: clock_label
          text: !lambda |-
            return id(rtc_time).now().strftime("%H:%M:%S");
      - lvgl.label.update:
          id: date_value_label
          text: !lambda |-
            static const char * const mon_names[] = {"Led", "Un", "Bre", "Dub", "Kve", "Cvn",
                                                     "Cvc", "Srp", "Zar", "Rij", "Lis", "Pro"};
            static char date_buf[8];
            auto now = id(rtc_time).now();
            snprintf(date_buf, sizeof(date_buf), "%s %2d", mon_names[now.month-1], now.day_of_month);
            return date_buf;
            

  - id: send_tts_uri_event
    parameters:
      tts_uri: string
    then:
      - homeassistant.event:
          event: esphome.tts_uri
          data:
            uri: return tts_uri;

  - id: send_stt_text_event
    parameters:
      stt_text: string
    then:
      - homeassistant.event:
          event: esphome.stt_text
          data:
            text: return stt_text;

  - id: draw_display
    then:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - if:
                condition:
                  wifi.connected: null
                then:
                  - if:
                      condition:
                        api.connected: null
                      then:
                        - if:
                            condition:
                              lambda: return id(voice_assistant_phase) == ${voice_assist_listening_phase_id};
                            then:
                              lvgl.page.show: listening_page
                        - if:
                            condition:
                              lambda: return id(voice_assistant_phase) == ${voice_assist_thinking_phase_id};
                            then:
                              lvgl.page.show: thinking_page
                        - if:
                            condition:
                              lambda: return id(voice_assistant_phase) == ${voice_assist_replying_phase_id};
                            then:
                              lvgl.page.show: replying_page
                        - if:
                            condition:
                              lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
                            then:
                              lvgl.page.show: error_page
                        - if:
                            condition:
                              lambda: return id(voice_assistant_phase) == ${voice_assist_muted_phase_id};
                            then:
                              lvgl.page.show: muted_page
                        - if:
                            condition:
                              lambda: return id(voice_assistant_phase) == ${voice_assist_not_ready_phase_id};
                            then:
                              lvgl.page.show: no_ha_page
                        - if:
                            condition:
                              lambda: >+
                                return id(voice_assistant_phase) != ${voice_assist_listening_phase_id}
                                &&
                                       id(voice_assistant_phase) != ${voice_assist_thinking_phase_id} &&
                                       id(voice_assistant_phase) != ${voice_assist_replying_phase_id} &&
                                       id(voice_assistant_phase) != ${voice_assist_error_phase_id} &&
                                       id(voice_assistant_phase) != ${voice_assist_muted_phase_id} &&
                                       id(voice_assistant_phase) != ${voice_assist_not_ready_phase_id};
                                     
                            then:
                              - lvgl.page.show: idle_page
                      else:
                        - lvgl.page.show: no_ha_page
                else:
                  - lvgl.page.show: no_wifi_page
          else:
            - lvgl.page.show: initializing_page

  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running: null
              - lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start: null

  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - micro_wake_word.stop: null

  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_off: mute
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};



